<!DOCTYPE html>
<html lang="en"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>joseIsAudio | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="main-slider">

        <section id="bio" class="page">
          <h2>About Me</h2>
          <p>Audio Designer & Composer</p>
          <button onclick="navigateTo('hero')">Back</button>
        </section>
        
        <section id="hero" class="page">
            <div class="nav-container">
                <div class="bubble bio-btn" onclick="navigateTo('bio')">Bio</div>
                <div class="bubble port-btn" onclick="navigateTo('portfolio')">Work</div>
                <div class="bubble blog-btn" onclick="navigateTo('blog')">Blog</div>
                <div class="bubble talks-btn" onclick="navigateTo('talks')">Talks</div>
                <h1 class="main-title">joseIsAudio</h1>
            </div>
        </section>

        <section id="portfolio" class="page">
          <h2> Some of my work</h2>
          <button onclick="navigateTo('hero')">Back</button>
        </section>

        <section id="blog" class="page">
          <h2> Blog </h2>/
          <button onclick="navigateTo('hero')">Back</button>
        </section>

        <section id ="talks" class="page">
          <h2> Some of my talks!</h2>
          <button onclick="navigateTo('hero')">Back</button>
        </section>

    </main>

    <script>
      function navigateTo(sectionId) {
        const slider = document.getElementById('main-slider');

        switch(sectionId){
          case 'hero':
            slider.style.transform = 'translate(0,0)';
            break;
          case 'bio':
            slider.style.transform = 'translateX(100vw)';
            break;
          case 'portfolio':
            slider.style.transform = 'translateX(-100vw)';
            break;
          case 'blog':
            slider.style.transform = 'translateY(100vh)'; // Movemos abajo para ver lo de arriba
            break;
          case 'talks':
            slider.style.transform = 'translateY(-100vh)'; // Movemos arriba para ver lo de abajo
            break;
        }


      }
    </script>
</body>
</html>
