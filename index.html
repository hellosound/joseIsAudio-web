<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>joseIsAudio | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app-container">
        <section id="hero" class="content-page active">
            <div class="nav-container">
                <div class="bubble bio-btn" onclick="showPage('bio')">Bio</div>
                <div class="bubble port-btn" onclick="showPage('portfolio')">Work</div>
                <div class="bubble blog-btn" onclick="showPage('blog')">Blog</div>
                <div class="bubble talks-btn" onclick="showPage('talks')">Talks</div>
                <h1 class="main-title">joseIsAudio</h1>
            </div>

            <div class="stickers-layer">
                <div class="sticker game-1" onclick="openGameDetails('TMNT', 'https://www.youtube.com/embed/DnWM6KA_N58')">TMNT</div>
                <div class="sticker game-2" onclick="openGameDetails('Inner', 'https://www.youtube.com/embed/bm9BN-TA3V0')">Inner</div>
                <div class="sticker game-3" onclick="openGameDetails('OMD', 'https://www.youtube.com/embed/1cTftd4pNaY')">Orcs Must Die</div>
            </div>
        </section>

        <section id="bio" class="content-page">
            <h2>About Me</h2>
            <p>Audio Designer & Game Audio Programmer</p>
            <button class="back-btn" onclick="showPage('hero')">Back</button>
        </section>

        <section id="portfolio" class="content-page">
            <h2>Portfolio</h2>
            <button class="back-btn" onclick="showPage('hero')">Back</button>
        </section>

        <section id="blog" class="content-page">
            <h2>Blog</h2>
            <button class="back-btn" onclick="showPage('hero')">Back</button>
        </section>

        <section id="talks" class="content-page">
            <h2>Talks</h2>
            <button class="back-btn" onclick="showPage('hero')">Back</button>
        </section>
    </main>

    <div id="game-overlay" class="overlay">
        <div class="overlay-content">
            <button class="close-btn" onclick="closeGameDetails()">X</button>
            <h2 id="game-title">Game Title</h2>
            <div class="video-container">
                <iframe id="game-video" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <p>Audio Implementation & Sound Design</p>
            <button class="back-btn" onclick="showPage('portfolio')">See more games</button>
        </div>
    </div>
<script src="script.js"></script>

  </body>
</html>
